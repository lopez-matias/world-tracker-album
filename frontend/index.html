<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mundial 2026 — Álbum de Figuritas</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="auth-page">
  <div class="auth-bg">
    <div class="auth-orb auth-orb-1"></div>
    <div class="auth-orb auth-orb-2"></div>
  </div>

  <main class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <svg class="auth-logo-icon" xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M8 2v6l-2 4h12l-2-4V2z"/><path d="M6 12c0 2.5 1.5 4 6 4s6-1.5 6-4"/>
          <line x1="12" y1="16" x2="12" y2="20"/><line x1="8" y1="20" x2="16" y2="20"/>
          <path d="M8 4H5c0 4 2 6 4 7"/><path d="M16 4h3c0 4-2 6-4 7"/>
        </svg>
        <h1>Mundial 2026</h1>
        <p class="auth-subtitle">Álbum de Figuritas</p>
      </div>

      <!-- Login Form -->
      <form id="loginForm" class="auth-form active">
        <div class="form-group">
          <label for="loginInput">Usuario o email</label>
          <input type="text" id="loginInput" placeholder="usuario o email@ejemplo.com" autocomplete="username" />
        </div>
        <div class="form-group">
          <label for="loginPassword">Contraseña</label>
          <div class="input-wrapper">
            <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password" />
            <button type="button" class="toggle-pw" onclick="togglePw('loginPassword', this)" aria-label="Mostrar u ocultar contraseña">
              <svg class="icon-eye" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg class="icon-eye-off" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
        </div>
        <div class="form-row">
          <label class="checkbox-label">
            <input type="checkbox" id="rememberMe" />
            <span>Recordarme 30 días</span>
          </label>
        </div>
        <div id="loginError" class="form-error hidden"></div>
        <button type="submit" class="btn btn-primary btn-full">Ingresar</button>
        <p class="form-switch">¿No tenés cuenta? <a href="#" class="link" id="toRegister">Registrate</a></p>
      </form>

      <!-- Register Form -->
      <form id="registerForm" class="auth-form">
        <div class="form-group">
          <label for="regUsername">Nombre de usuario</label>
          <input type="text" id="regUsername" placeholder="usuario123" autocomplete="username" maxlength="20" />
          <span class="form-hint">3-20 caracteres: letras, números, - y _</span>
        </div>
        <div class="form-group">
          <label for="regEmail">Email</label>
          <input type="email" id="regEmail" placeholder="vos@ejemplo.com" autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="regPassword">Contraseña</label>
          <div class="input-wrapper">
            <input type="password" id="regPassword" placeholder="Mínimo 8 caracteres" autocomplete="new-password" />
            <button type="button" class="toggle-pw" onclick="togglePw('regPassword', this)" aria-label="Mostrar u ocultar contraseña">
              <svg class="icon-eye" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg class="icon-eye-off" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
        </div>
        <div id="registerError" class="form-error hidden"></div>
        <button type="submit" class="btn btn-primary btn-full">Crear cuenta</button>
        <p class="form-switch">¿Ya tenés cuenta? <a href="#" class="link" id="toLogin">Iniciá sesión</a></p>
      </form>

    </div>
  </main>

  <script src="js/auth.js"></script>
</body>
</html>
