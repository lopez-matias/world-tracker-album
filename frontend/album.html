<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FIFA WORLD CUP | PANINI</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="album-page">

  <!-- Splash / intro cinematic -->
  <div id="splash" class="splash">
    <div class="splash-inner">
      <div class="splash-ball">⚽</div>
      <div class="splash-label">FIFA WORLD CUP</div>
      <div class="splash-year">2026</div>
      <div class="splash-hosts">USA · CANADA · MEXICO</div>
      <div class="splash-bar"><div class="splash-bar-fill"></div></div>
    </div>
  </div>

  <div id="countryBg" class="country-bg"></div>
  <div id="flagBg" class="flag-bg"></div>

  <!-- Header -->
  <header class="album-header">
    <div class="header-left">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M8 2v6l-2 4h12l-2-4V2z"/><path d="M6 12c0 2.5 1.5 4 6 4s6-1.5 6-4"/>
        <line x1="12" y1="16" x2="12" y2="20"/><line x1="8" y1="20" x2="16" y2="20"/>
        <path d="M8 4H5c0 4 2 6 4 7"/><path d="M16 4h3c0 4-2 6-4 7"/>
      </svg>
      <span class="header-title">FIFA WORLD CUP</span>
    </div>
    <div class="header-center">
      <div class="global-progress">
        <div class="global-progress-bar">
          <div id="globalProgressFill" class="global-progress-fill"></div>
        </div>
        <span id="globalProgressText" class="global-progress-text">0 / 0</span>
      </div>
    </div>
    <div class="header-right">
      <button id="searchBtn" class="btn-icon" aria-label="Buscar figurita">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
      <a href="/profile" class="btn-profile" title="Mi perfil">
        <span id="headerUsername">...</span>
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </a>
    </div>
  </header>

  <!-- Main -->
  <main class="album-main">
    <div class="country-view">
      <div class="country-header">
        <div class="country-flag-emoji" id="countryFlagEmoji"></div>
        <div class="country-info">
          <div class="country-name-row">
            <h2 id="countryName" class="country-name"></h2>
            <span id="countryGroupBadge" class="group-badge hidden"></span>
          </div>
          <div class="country-progress-wrap">
            <div class="country-progress-bar">
              <div id="countryProgressFill" class="country-progress-fill"></div>
            </div>
            <span id="countryProgressText" class="country-progress-text">0/20</span>
          </div>
        </div>
      </div>
      <div id="stickerGrid" class="sticker-grid"></div>
    </div>
  </main>

  <!-- Nav sin dots -->
  <nav class="album-nav">
    <button id="prevBtn" class="nav-btn" aria-label="Anterior">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <span id="navPosition" class="nav-position">1 / 50</span>
    <button id="nextBtn" class="nav-btn" aria-label="Siguiente">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </nav>

  <!-- Buscador overlay -->
  <div id="searchOverlay" class="search-overlay" role="dialog" aria-modal="true" aria-label="Buscar figurita">
    <div class="search-panel">
      <div class="search-header">
        <div class="search-input-wrap">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="search" id="searchInput" placeholder="País, jugador o código..." autocomplete="off" />
        </div>
        <button id="searchClose" class="btn-icon" aria-label="Cerrar">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div id="searchResults" class="search-results"></div>
    </div>
  </div>

  <script src="js/album.js"></script>
</body>
</html>
